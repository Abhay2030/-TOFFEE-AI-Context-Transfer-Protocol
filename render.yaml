services:
  # Toffee Backend API
  - type: web
    name: toffee-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npx turbo run build --filter=@toffee/backend
    startCommand: npm run db:migrate && npm run start --workspace=@toffee/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        # Replace this with the actual Vercel URL once deployed
        value: https://toffee-web.vercel.app
      - key: AWS_REGION
        value: auto
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        value: toffee-bundles
